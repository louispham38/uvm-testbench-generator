<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UVM Testbench Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/verilog.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="h-full bg-gray-950 text-gray-100">
  <div id="app" class="flex flex-col h-full">

    <!-- Header -->
    <header class="border-b border-gray-800 bg-gray-900/80 backdrop-blur-md sticky top-0 z-50">
      <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center font-bold text-sm">UV</div>
          <h1 class="text-lg font-semibold tracking-tight">UVM Testbench Generator</h1>
          <span class="hidden sm:inline text-xs text-gray-300 border border-gray-600 rounded px-1.5 py-0.5 font-medium">v1.0</span>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="loadExample()" class="text-sm text-gray-300 hover:text-white transition font-medium">Load Example</button>
          <a href="https://github.com" target="_blank" class="text-gray-400 hover:text-white transition">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.31 3.5 1 .1-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 016.02 0c2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.82.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
          </a>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-hidden flex">

      <!-- Left Panel: Configuration -->
      <aside id="config-panel" class="w-[420px] min-w-[360px] border-r border-gray-800 overflow-y-auto bg-gray-900/50">
        <div class="p-5 space-y-6">

          <!-- Project -->
          <section>
            <h2 class="section-title">Project</h2>
            <div class="space-y-3">
              <div>
                <label class="label">Project Name</label>
                <input id="project_name" type="text" value="my_dut" class="input" placeholder="e.g. axi_slave" />
              </div>
              <div>
                <label class="label">Module Name <span class="text-gray-400">(optional)</span></label>
                <input id="module_name" type="text" class="input" placeholder="defaults to project name" />
              </div>
            </div>
          </section>

          <!-- Protocol -->
          <section>
            <h2 class="section-title">Protocol</h2>
            <div class="space-y-3">
              <div>
                <label class="label">Protocol Type</label>
                <select id="protocol_type" class="input" onchange="onProtocolChange()">
                  <option value="custom">Custom</option>
                  <option value="axi4_lite">AXI4-Lite</option>
                  <option value="apb">APB</option>
                  <option value="spi">SPI</option>
                  <option value="uart">UART</option>
                </select>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="label">Data Width</label>
                  <input id="data_width" type="number" value="32" min="1" class="input" />
                </div>
                <div>
                  <label class="label">Addr Width</label>
                  <input id="addr_width" type="number" value="32" min="1" class="input" />
                </div>
              </div>
              <div>
                <label class="label">Clock Freq (MHz)</label>
                <input id="clock_freq" type="number" value="100" min="1" step="0.1" class="input" />
              </div>
            </div>
          </section>

          <!-- Ports -->
          <section>
            <h2 class="section-title flex items-center justify-between">
              Ports / Signals
              <div class="flex gap-2">
                <button onclick="loadProtocolPorts()" class="btn-sm btn-secondary">Auto from Protocol</button>
                <button onclick="addPort()" class="btn-sm btn-primary">+ Add</button>
              </div>
            </h2>
            <div id="ports-container" class="space-y-2 max-h-64 overflow-y-auto pr-1">
              <!-- dynamically filled -->
            </div>
            <p id="ports-empty" class="text-xs text-gray-400 mt-2" style="font-style:italic;">No custom ports. Protocol defaults will be used.</p>
          </section>

          <!-- Components -->
          <section>
            <h2 class="section-title">Components to Generate</h2>
            <div class="grid grid-cols-2 gap-x-4 gap-y-1.5">
              <label class="checkbox-label"><input type="checkbox" id="comp_interface"     checked class="checkbox" /> Interface</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_sequence_item"  checked class="checkbox" /> Sequence Item</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_sequences"      checked class="checkbox" /> Sequences</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_driver"         checked class="checkbox" /> Driver</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_monitor"        checked class="checkbox" /> Monitor</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_sequencer"      checked class="checkbox" /> Sequencer</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_agent"          checked class="checkbox" /> Agent</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_scoreboard"     checked class="checkbox" /> Scoreboard</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_coverage"       checked class="checkbox" /> Coverage</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_env"            checked class="checkbox" /> Environment</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_test"           checked class="checkbox" /> Test</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_top"            checked class="checkbox" /> TB Top</label>
              <label class="checkbox-label"><input type="checkbox" id="comp_package"        checked class="checkbox" /> Package</label>
            </div>
          </section>

          <!-- Tests -->
          <section>
            <h2 class="section-title flex items-center justify-between">
              Test Scenarios
              <button onclick="addTest()" class="btn-sm btn-primary">+ Add Test</button>
            </h2>
            <div id="tests-container" class="space-y-3">
              <!-- dynamically filled -->
            </div>
          </section>

          <!-- Agent Config -->
          <section>
            <h2 class="section-title">Agent Config</h2>
            <div class="grid grid-cols-2 gap-x-4 gap-y-1.5">
              <label class="checkbox-label"><input type="checkbox" id="agent_active"   checked class="checkbox" /> Active Agent</label>
              <label class="checkbox-label"><input type="checkbox" id="agent_driver"    checked class="checkbox" /> Has Driver</label>
              <label class="checkbox-label"><input type="checkbox" id="agent_monitor"   checked class="checkbox" /> Has Monitor</label>
              <label class="checkbox-label"><input type="checkbox" id="agent_sequencer" checked class="checkbox" /> Has Sequencer</label>
              <label class="checkbox-label"><input type="checkbox" id="agent_coverage"  checked class="checkbox" /> Has Coverage</label>
            </div>
          </section>

          <!-- Action Buttons -->
          <div class="flex gap-3 pt-2 pb-6">
            <button onclick="generatePreview()" class="btn btn-primary flex-1">Generate Preview</button>
            <button onclick="downloadZip()" class="btn btn-secondary flex-1">Download ZIP</button>
          </div>

        </div>
      </aside>

      <!-- Right Panel: Preview -->
      <div class="flex-1 flex flex-col overflow-hidden">

        <!-- File Tabs -->
        <div class="border-b border-gray-800 bg-gray-900/60 flex items-center gap-1 px-3 overflow-x-auto" id="file-tabs">
          <span class="text-sm text-gray-400 py-2 px-2">Configure and click Generate Preview</span>
        </div>

        <!-- Code Preview -->
        <div id="code-preview" class="flex-1 overflow-auto p-4 bg-gray-950">
          <div class="flex items-center justify-center h-full text-gray-400">
            <div class="text-center">
              <svg class="w-16 h-16 mx-auto mb-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
              </svg>
              <p class="text-lg font-semibold text-gray-300">No preview yet</p>
              <p class="text-sm mt-1 text-gray-400">Configure your testbench and click <strong class="text-white">Generate Preview</strong></p>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
